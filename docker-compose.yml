# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: wix_hubspot
      POSTGRES_PASSWORD: wix_hubspot_password
      POSTGRES_DB: wix_hubspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://wix_hubspot:wix_hubspot_password@postgres:5432/wix_hubspot
      HUBSPOT_CLIENT_ID: ${HUBSPOT_CLIENT_ID}
      HUBSPOT_CLIENT_SECRET: ${HUBSPOT_CLIENT_SECRET}
      HUBSPOT_REDIRECT_URI: ${HUBSPOT_REDIRECT_URI}
      WIX_APP_ID: ${WIX_APP_ID}
      WIX_PUBLIC_KEY: ${WIX_PUBLIC_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3000

volumes:
  postgres_data: